<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito RPG - 隐身笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #37352f;
            height: 100vh;
            overflow: hidden;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-title {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .start-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .character-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 600px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .character-card {
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            text-align: center;
        }

        .character-card:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
            transform: translateY(-2px);
        }

        .character-card.selected {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .character-portrait {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .character-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .character-desc {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .note-type-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 600px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .note-type-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        .note-type-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
            transform: translateY(-2px);
        }

        .note-type-btn.selected {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .start-btn {
            margin-top: 1rem;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 60px 80px;
            max-width: 900px;
            margin: 0 auto;
        }

        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 20px;
        }

        .editor-container::-webkit-scrollbar {
            width: 8px;
        }

        .editor-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .editor-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .editor-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #37352f;
            margin-bottom: 8px;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
        }

        .editor-subtitle {
            font-size: 0.9rem;
            color: #9b9a97;
            margin-bottom: 30px;
        }

        .editor-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #37352f;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #37352f;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .risk-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 16px 20px;
            min-width: 280px;
            z-index: 100;
        }

        .risk-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9b9a97;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .risk-item {
            margin-bottom: 10px;
        }

        .risk-item:last-child {
            margin-bottom: 0;
        }

        .risk-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .risk-label.teacher {
            color: #ef4444;
        }

        .risk-label.classmate {
            color: #f59e0b;
        }

        .risk-bar-container {
            width: 100%;
            height: 6px;
            background: #e9e9e7;
            border-radius: 3px;
            overflow: hidden;
        }

        .risk-bar.teacher {
            height: 100%;
            background: linear-gradient(90deg, #fca5a5, #ef4444);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .risk-bar.classmate {
            height: 100%;
            background: linear-gradient(90deg, #fcd34d, #f59e0b);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 20px 24px;
            min-width: 300px;
            max-width: 400px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .progress-panel.collapsed {
            min-width: auto;
            padding: 12px 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9b9a97;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: #9b9a97;
            font-size: 1.2rem;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .progress-toggle:hover {
            background: #f7f6f3;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e9e9e7;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #37352f;
        }

        .progress-percent {
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .choice-options {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e9e9e7;
        }

        .choice-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
        }

        .choice-option {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #f7f6f3;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choice-option:hover {
            background: #e9e9e7;
            transform: translateX(4px);
        }

        .choice-key {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .choice-text {
            font-size: 0.9rem;
            color: #37352f;
            line-height: 1.5;
        }

        .ending-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .ending-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .ending-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ending-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .ending-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #37352f;
        }

        .ending-title.success {
            color: #10b981;
        }

        .ending-title.caught {
            color: #ef4444;
        }

        .ending-description {
            font-size: 1rem;
            line-height: 1.8;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .ending-stats {
            background: #f7f6f3;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .stat-label {
            color: #6b7280;
        }

        .stat-value {
            font-weight: 600;
            color: #37352f;
        }

        .achievements-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .achievement-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #fef3c7, #fcd34d);
            border-radius: 20px;
            font-size: 0.85rem;
            animation: pulse 1s ease;
        }

        .achievement-badge.rare {
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
        }

        .achievement-badge.legendary {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .receipt-container {
            background: #fafafa;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }

        .restart-btn {
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .secondary-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secondary-btn:hover {
            background: #667eea;
            color: white;
        }

        .hint-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }

        .hint-text.visible {
            opacity: 1;
        }

        .collapsed-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 100;
            display: none;
        }

        .collapsed-panel.visible {
            display: block;
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            padding: 32px;
            max-width: 400px;
            text-align: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .notification.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .notification-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .notification-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #37352f;
            margin-bottom: 8px;
        }

        .notification-desc {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .notification-rarity {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .rarity-common {
            background: #e5e7eb;
            color: #6b7280;
        }

        .rarity-uncommon {
            background: #d1fae5;
            color: #059669;
        }

        .rarity-rare {
            background: #ede9fe;
            color: #7c3aed;
        }

        .rarity-legendary {
            background: #fef3c7;
            color: #d97706;
        }

        .notification-btn {
            padding: 10px 28px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .special-event-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .special-event-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .special-event-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            padding: 28px;
            max-width: 450px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .event-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .event-icon {
            font-size: 2rem;
        }

        .event-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ef4444;
        }

        .event-description {
            font-size: 0.95rem;
            color: #37352f;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .event-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-option {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f7f6f3;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .event-option:hover {
            background: #e9e9e7;
            border-left-color: #667eea;
        }

        .event-option-key {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 12px;
        }

        .event-option-text {
            font-size: 0.9rem;
            color: #37352f;
        }

        .fragment-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 16px 20px;
            min-width: 200px;
            z-index: 100;
        }

        .fragment-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9b9a97;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .fragment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fragment-slot {
            width: 36px;
            height: 36px;
            background: #e9e9e7;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .fragment-slot.collected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation: pulse 0.5s ease;
        }

        .fragment-slot.locked {
            opacity: 0.4;
        }

        .fragment-count {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1 class="start-title">Incognito RPG</h1>
        <p class="start-subtitle">一款披着笔记软件外衣的文字冒险越狱游戏</p>
        
        <p class="section-title">选择角色</p>
        <div class="character-selector" id="characterSelector">
        </div>
        
        <p class="section-title">选择笔记类型</p>
        <div class="note-type-selector" id="noteTypeSelector">
        </div>
        
        <button class="start-btn" id="startBtn" disabled>开始游戏</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <div class="editor-container" id="editorContainer">
            <input type="text" class="editor-title" id="editorTitle" value="无标题" readonly>
            <div class="editor-subtitle" id="editorSubtitle">高等数学笔记</div>
            <div class="editor-content" id="editorContent">
                <span class="cursor" id="cursor"></span>
            </div>
        </div>
    </div>

    <div class="fragment-panel" id="fragmentPanel" style="display: none;">
        <div class="fragment-title">📚 笔记碎片</div>
        <div class="fragment-list" id="fragmentList">
        </div>
        <div class="fragment-count" id="fragmentCount">0/5 已收集</div>
    </div>

    <div class="risk-panel" id="riskPanel" style="display: none;">
        <div class="risk-title">⚠️ 风险值</div>
        <div class="risk-item">
            <div class="risk-label teacher">
                <span>👨‍🏫 老师警觉度</span>
                <span id="teacherAlertness">0%</span>
            </div>
            <div class="risk-bar-container">
                <div class="risk-bar teacher" id="teacherRiskBar" style="width: 0%"></div>
            </div>
        </div>
        <div class="risk-item">
            <div class="risk-label classmate">
                <span>👥 同学怀疑度</span>
                <span id="classmateSuspicion">0%</span>
            </div>
            <div class="risk-bar-container">
                <div class="risk-bar classmate" id="classmateRiskBar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="progress-panel" id="progressPanel">
        <div class="progress-header">
            <span class="progress-title">RPG 进度</span>
            <button class="progress-toggle" id="collapseBtn">−</button>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">正在加载游戏...</div>
        <div class="choice-options" id="choiceOptions" style="display: none;">
            <div class="choice-title">请选择你的行动（按对应数字键）：</div>
            <div id="optionsList"></div>
        </div>
    </div>

    <div class="collapsed-panel" id="collapsedPanel">
        RPG进度: <span id="collapsedPercent">0%</span>
    </div>

    <div class="hint-text" id="hintText">开始敲击键盘来推进剧情吧！</div>

    <div class="ending-screen" id="endingScreen">
        <div class="ending-card">
            <div class="ending-icon" id="endingIcon">🎉</div>
            <h2 class="ending-title" id="endingTitle">恭喜你！</h2>
            <p class="ending-description" id="endingDescription">你成功逃脱了！</p>
            
            <div class="ending-stats" id="endingStats" style="display: none;">
                <div class="stat-row">
                    <span class="stat-label">角色</span>
                    <span class="stat-value" id="statCharacter">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">敲击次数</span>
                    <span class="stat-value" id="statKeystrokes">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">老师警觉度</span>
                    <span class="stat-value" id="statTeacherRisk">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">同学怀疑度</span>
                    <span class="stat-value" id="statClassmateRisk">-</span>
                </div>
            </div>
            
            <div class="achievements-list" id="achievementsList" style="display: none;">
            </div>
            
            <div class="receipt-container" id="receiptContainer" style="display: none;">
            </div>
            
            <button class="restart-btn" id="restartBtn">再玩一次</button>
            <button class="secondary-btn" id="generateReceiptBtn" style="display: none;">生成通关小票</button>
        </div>
    </div>

    <div class="notification" id="achievementNotification">
        <div class="notification-icon" id="achievementIcon">🏆</div>
        <div class="notification-rarity" id="achievementRarity">传奇</div>
        <h3 class="notification-title" id="achievementTitle">成就解锁！</h3>
        <p class="notification-desc" id="achievementDesc">描述</p>
        <button class="notification-btn" id="closeAchievementBtn">继续游戏</button>
    </div>

    <div class="notification" id="fragmentNotification">
        <div class="notification-icon">📄</div>
        <h3 class="notification-title">笔记碎片获得！</h3>
        <p class="notification-desc" id="fragmentDesc">你获得了新的笔记碎片</p>
        <button class="notification-btn" id="closeFragmentBtn">继续游戏</button>
    </div>

    <div class="special-event-overlay" id="specialEventOverlay">
        <div class="special-event-card">
            <div class="event-header">
                <span class="event-icon" id="eventIcon">⚠️</span>
                <h3 class="event-title" id="eventTitle">突发事件</h3>
            </div>
            <p class="event-description" id="eventDescription">描述</p>
            <div class="event-options" id="eventOptions">
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let selectedNoteType = null;
        let selectedCharacter = null;
        let isWaitingForChoice = false;
        let isPanelCollapsed = false;
        let currentNoteContent = '';
        let gameStats = {
            character: '',
            keystrokes: 0,
            teacherRisk: 0,
            classmateRisk: 0
        };

        const noteTypeNames = {
            'math': '高等数学笔记',
            'english': '大学英语笔记',
            'physics': '大学物理笔记',
            'history': '中国近现代史笔记'
        };

        const courseReplacements = {
            'math': {
                '数学课': '数学课',
                '数学': '数学',
                '微积分': '微积分',
                '讲着微积分': '讲着微积分',
                '这道题': '这道题',
                '做题': '做题',
                '记着数学': '记着数学'
            },
            'english': {
                '数学课': '英语课',
                '数学': '英语',
                '微积分': '语法',
                '讲着微积分': '讲着英语语法',
                '这道题': '这个句子',
                '做题': '做练习',
                '记着数学': '记着英语'
            },
            'physics': {
                '数学课': '物理课',
                '数学': '物理',
                '微积分': '力学公式',
                '讲着微积分': '讲着力学公式',
                '这道题': '这道题',
                '做题': '做题',
                '记着数学': '记着物理'
            },
            'history': {
                '数学课': '历史课',
                '数学': '历史',
                '微积分': '历史事件',
                '讲着微积分': '讲着历史事件',
                '这道题': '这个问题',
                '做题': '回答问题',
                '记着数学': '记着历史'
            }
        };

        async function fetchNoteTypes() {
            try {
                const response = await fetch('/api/note-types');
                const data = await response.json();
                return data.note_types;
            } catch (error) {
                console.error('Failed to fetch note types:', error);
                return [
                    { id: 'math', name: '高等数学' },
                    { id: 'english', name: '大学英语' },
                    { id: 'physics', name: '大学物理' },
                    { id: 'history', name: '中国近现代史' }
                ];
            }
        }

        async function fetchCharacters() {
            try {
                const response = await fetch('/api/characters');
                const data = await response.json();
                return data.characters;
            } catch (error) {
                console.error('Failed to fetch characters:', error);
                return [
                    { id: 'player', name: '你', description: '普通学生', portrait: '👤' },
                    { id: 'lin', name: '林小雨', description: '同桌', portrait: '👩' },
                    { id: 'wang', name: '王大力', description: '体育生', portrait: '👨' },
                    { id: 'chen', name: '陈书韵', description: '班长', portrait: '👧' }
                ];
            }
        }

        async function initStartScreen() {
            const noteTypes = await fetchNoteTypes();
            const characters = await fetchCharacters();
            
            const charSelector = document.getElementById('characterSelector');
            charSelector.innerHTML = characters.map(char => `
                <div class="character-card" data-char="${char.id}">
                    <div class="character-portrait">${char.portrait}</div>
                    <div class="character-name">${char.name}</div>
                    <div class="character-desc">${char.description}</div>
                </div>
            `).join('');

            charSelector.querySelectorAll('.character-card').forEach(card => {
                card.addEventListener('click', () => {
                    charSelector.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedCharacter = card.dataset.char;
                    checkStartButton();
                });
            });

            const noteSelector = document.getElementById('noteTypeSelector');
            noteSelector.innerHTML = noteTypes.map(type => `
                <button class="note-type-btn" data-type="${type.id}">
                    ${type.name}
                </button>
            `).join('');

            noteSelector.querySelectorAll('.note-type-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    noteSelector.querySelectorAll('.note-type-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedNoteType = btn.dataset.type;
                    checkStartButton();
                });
            });

            updateFragmentPanel(0, 5);
        }

        function checkStartButton() {
            const startBtn = document.getElementById('startBtn');
            if (selectedCharacter && selectedNoteType) {
                startBtn.disabled = false;
            }
        }

        async function startGame() {
            try {
                const response = await fetch('/api/start-game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        note_type: selectedNoteType,
                        character: selectedCharacter
                    })
                });
                
                const data = await response.json();
                sessionId = data.session_id;
                gameStats.character = data.character;
                
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameContainer').style.display = 'flex';
                document.getElementById('editorSubtitle').textContent = noteTypeNames[selectedNoteType];
                document.getElementById('riskPanel').style.display = 'block';
                document.getElementById('fragmentPanel').style.display = 'block';
                
                updateProgress(data.progress, data.initial_node);
                updateRiskDisplay(0, 0);
                
                setTimeout(() => {
                    document.getElementById('hintText').classList.add('visible');
                    setTimeout(() => {
                        document.getElementById('hintText').classList.remove('visible');
                    }, 3000);
                }, 500);
                
            } catch (error) {
                console.error('Failed to start game:', error);
                alert('游戏启动失败，请刷新页面重试');
            }
        }

        async function handleKeystroke() {
            if (!sessionId || isWaitingForChoice) return;
            
            try {
                gameStats.keystrokes++;
                const response = await fetch(`/api/keystroke/${sessionId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.text_to_add) {
                    addToEditor(data.text_to_add);
                }
                
                updateProgress(data.progress_percent, data.progress_description);
                updateRiskDisplay(data.teacher_alertness, data.classmate_suspicion);
                
                gameStats.teacherRisk = data.teacher_alertness;
                gameStats.classmateRisk = data.classmate_suspicion;
                
                if (data.achievement_unlocked) {
                    showAchievementNotification(data.achievement_unlocked);
                }
                
                if (data.note_fragment) {
                    showFragmentNotification(data.note_fragment);
                }
                
                if (data.special_event) {
                    showSpecialEvent(data.special_event);
                    return;
                }
                
                if (data.is_choice && !data.game_ended) {
                    showChoices(data.options);
                    isWaitingForChoice = true;
                }
                
                if (data.is_ending) {
                    showEnding(data.ending_type, data.progress_description);
                }
                
            } catch (error) {
                console.error('Failed to process keystroke:', error);
            }
        }

        async function makeChoice(choiceKey) {
            if (!sessionId || !isWaitingForChoice) return;
            
            try {
                const response = await fetch(`/api/make-choice/${sessionId}?choice_key=${choiceKey}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    hideChoices();
                    isWaitingForChoice = false;
                    updateProgress(data.progress, data.next_description);
                    updateRiskDisplay(data.teacher_alertness, data.classmate_suspicion);
                    
                    gameStats.teacherRisk = data.teacher_alertness;
                    gameStats.classmateRisk = data.classmate_suspicion;
                    
                    if (data.achievement_unlocked) {
                        showAchievementNotification(data.achievement_unlocked);
                    }
                    
                    if (data.note_fragment) {
                        showFragmentNotification(data.note_fragment);
                    }
                    
                    if (data.is_ending) {
                        showEnding(data.ending_type, data.next_description);
                    } else if (data.is_choice) {
                        setTimeout(() => {
                            showChoices(data.options);
                            isWaitingForChoice = true;
                        }, 500);
                    }
                }
                
            } catch (error) {
                console.error('Failed to make choice:', error);
            }
        }

        async function handleSpecialEvent(choiceKey, eventType) {
            try {
                const response = await fetch(`/api/handle-special-event/${sessionId}?choice_key=${choiceKey}&event_type=${eventType}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    hideSpecialEvent();
                    updateRiskDisplay(data.teacher_alertness, data.classmate_suspicion);
                    gameStats.teacherRisk = data.teacher_alertness;
                    gameStats.classmateRisk = data.classmate_suspicion;
                }
                
            } catch (error) {
                console.error('Failed to handle special event:', error);
            }
        }

        function addToEditor(text) {
            const content = document.getElementById('editorContent');
            const container = document.getElementById('editorContainer');
            const cursor = document.getElementById('cursor');
            
            cursor.remove();
            currentNoteContent += text;
            content.textContent = currentNoteContent;
            content.appendChild(cursor);
            
            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        function replaceCourseNames(description) {
            if (!selectedNoteType || !courseReplacements[selectedNoteType]) {
                return description;
            }
            
            const replacements = courseReplacements[selectedNoteType];
            let result = description;
            
            const sortedKeys = Object.keys(replacements).sort((a, b) => b.length - a.length);
            
            for (const key of sortedKeys) {
                if (key !== replacements[key]) {
                    const regex = new RegExp(key, 'g');
                    result = result.replace(regex, replacements[key]);
                }
            }
            
            return result;
        }

        function updateProgress(percent, description) {
            const replacedDescription = replaceCourseNames(description);
            document.getElementById('progressPercent').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = replacedDescription;
            document.getElementById('collapsedPercent').textContent = `${percent}%`;
        }

        function updateRiskDisplay(teacherAlertness, classmateSuspicion) {
            document.getElementById('teacherAlertness').textContent = `${teacherAlertness}%`;
            document.getElementById('classmateSuspicion').textContent = `${classmateSuspicion}%`;
            document.getElementById('teacherRiskBar').style.width = `${teacherAlertness}%`;
            document.getElementById('classmateRiskBar').style.width = `${classmateSuspicion}%`;
        }

        function updateFragmentPanel(collected, total) {
            const fragmentList = document.getElementById('fragmentList');
            let html = '';
            for (let i = 0; i < total; i++) {
                if (i < collected) {
                    html += '<div class="fragment-slot collected">📄</div>';
                } else {
                    html += '<div class="fragment-slot locked">?</div>';
                }
            }
            fragmentList.innerHTML = html;
            document.getElementById('fragmentCount').textContent = `${collected}/${total} 已收集`;
        }

        function showChoices(options) {
            const optionsList = document.getElementById('optionsList');
            const choiceOptions = document.getElementById('choiceOptions');
            
            optionsList.innerHTML = options.map(opt => `
                <div class="choice-option" data-key="${opt.key}">
                    <span class="choice-key">${opt.key}</span>
                    <span class="choice-text">${opt.text}</span>
                </div>
            `).join('');
            
            optionsList.querySelectorAll('.choice-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    makeChoice(opt.dataset.key);
                });
            });
            
            choiceOptions.style.display = 'block';
            
            document.getElementById('hintText').textContent = '按数字键选择你的行动！';
            document.getElementById('hintText').classList.add('visible');
        }

        function hideChoices() {
            document.getElementById('choiceOptions').style.display = 'none';
            document.getElementById('hintText').classList.remove('visible');
        }

        function showAchievementNotification(achievement) {
            const notification = document.getElementById('achievementNotification');
            document.getElementById('achievementIcon').textContent = achievement.icon;
            document.getElementById('achievementTitle').textContent = achievement.name;
            document.getElementById('achievementDesc').textContent = achievement.description;
            
            const rarityEl = document.getElementById('achievementRarity');
            const rarityMap = {
                'common': { text: '普通', class: 'rarity-common' },
                'uncommon': { text: '稀有', class: 'rarity-uncommon' },
                'rare': { text: '史诗', class: 'rarity-rare' },
                'legendary': { text: '传奇', class: 'rarity-legendary' }
            };
            
            const rarity = rarityMap[achievement.rarity] || rarityMap['common'];
            rarityEl.textContent = rarity.text;
            rarityEl.className = `notification-rarity ${rarity.class}`;
            
            notification.classList.add('visible');
        }

        function showFragmentNotification(fragment) {
            const notification = document.getElementById('fragmentNotification');
            document.getElementById('fragmentDesc').textContent = `你获得了：${fragment.title}`;
            notification.classList.add('visible');
        }

        function showSpecialEvent(event) {
            const overlay = document.getElementById('specialEventOverlay');
            document.getElementById('eventTitle').textContent = '突发事件！';
            document.getElementById('eventDescription').textContent = event.description;
            
            const optionsList = document.getElementById('eventOptions');
            optionsList.innerHTML = event.options.map((opt, index) => `
                <div class="event-option" data-key="${opt.key}" data-event="${event.type}">
                    <span class="event-option-key">${opt.key}</span>
                    <span class="event-option-text">${opt.text}</span>
                </div>
            `).join('');
            
            optionsList.querySelectorAll('.event-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    handleSpecialEvent(opt.dataset.key, opt.dataset.event);
                });
            });
            
            overlay.classList.add('visible');
            isWaitingForChoice = true;
        }

        function hideSpecialEvent() {
            document.getElementById('specialEventOverlay').classList.remove('visible');
            isWaitingForChoice = false;
        }

        async function showEnding(endingType, description) {
            const endingScreen = document.getElementById('endingScreen');
            const endingIcon = document.getElementById('endingIcon');
            const endingTitle = document.getElementById('endingTitle');
            const endingDescription = document.getElementById('endingDescription');
            
            if (endingType === 'success') {
                endingIcon.textContent = '🎉';
                endingTitle.textContent = '恭喜你！越狱成功！';
                endingTitle.className = 'ending-title success';
            } else {
                endingIcon.textContent = '😢';
                endingTitle.textContent = '很遗憾，越狱失败...';
                endingTitle.className = 'ending-title caught';
            }
            
            endingDescription.textContent = description;
            
            document.getElementById('statCharacter').textContent = gameStats.character || '-';
            document.getElementById('statKeystrokes').textContent = gameStats.keystrokes;
            document.getElementById('statTeacherRisk').textContent = `${gameStats.teacherRisk}%`;
            document.getElementById('statClassmateRisk').textContent = `${gameStats.classmateRisk}%`;
            document.getElementById('endingStats').style.display = 'block';
            
            try {
                const response = await fetch(`/api/game-summary/${sessionId}`);
                const data = await response.json();
                
                if (data.achievements && data.achievements.length > 0) {
                    const achievementsList = document.getElementById('achievementsList');
                    achievementsList.innerHTML = data.achievements.map(ach => {
                        let badgeClass = 'achievement-badge';
                        if (ach.rarity === 'rare') badgeClass += ' rare';
                        if (ach.rarity === 'legendary') badgeClass += ' legendary';
                        return `<div class="${badgeClass}">${ach.icon} ${ach.name}</div>`;
                    }).join('');
                    achievementsList.style.display = 'flex';
                }
                
                updateFragmentPanel(data.collected_fragments.length, data.total_fragments);
            } catch (error) {
                console.error('Failed to fetch game summary:', error);
            }
            
            document.getElementById('generateReceiptBtn').style.display = 'inline-block';
            endingScreen.classList.add('visible');
        }

        async function generateReceipt() {
            try {
                const response = await fetch(`/api/generate-receipt/${sessionId}`);
                const data = await response.json();
                
                const receiptContainer = document.getElementById('receiptContainer');
                receiptContainer.innerHTML = `<pre style="white-space: pre-wrap; margin: 0;">${data.receipt}</pre>`;
                receiptContainer.style.display = 'block';
            } catch (error) {
                console.error('Failed to generate receipt:', error);
            }
        }

        function hideEnding() {
            document.getElementById('endingScreen').classList.remove('visible');
        }

        function restartGame() {
            sessionId = null;
            selectedNoteType = null;
            selectedCharacter = null;
            isWaitingForChoice = false;
            currentNoteContent = '';
            gameStats = {
                character: '',
                keystrokes: 0,
                teacherRisk: 0,
                classmateRisk: 0
            };
            
            hideEnding();
            hideChoices();
            
            document.getElementById('editorContent').textContent = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            cursor.id = 'cursor';
            document.getElementById('editorContent').appendChild(cursor);
            
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('riskPanel').style.display = 'none';
            document.getElementById('fragmentPanel').style.display = 'none';
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('startBtn').disabled = true;
            
            document.querySelectorAll('.note-type-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            document.getElementById('endingStats').style.display = 'none';
            document.getElementById('achievementsList').style.display = 'none';
            document.getElementById('receiptContainer').style.display = 'none';
            document.getElementById('generateReceiptBtn').style.display = 'none';
            
            updateProgress(0, '选择笔记类型开始游戏');
            updateRiskDisplay(0, 0);
            updateFragmentPanel(0, 5);
        }

        function togglePanel() {
            const panel = document.getElementById('progressPanel');
            const collapsed = document.getElementById('collapsedPanel');
            
            isPanelCollapsed = !isPanelCollapsed;
            
            if (isPanelCollapsed) {
                panel.classList.add('collapsed');
                panel.style.display = 'none';
                collapsed.classList.add('visible');
                document.getElementById('collapseBtn').textContent = '+';
            } else {
                panel.classList.remove('collapsed');
                panel.style.display = 'block';
                collapsed.classList.remove('visible');
                document.getElementById('collapseBtn').textContent = '−';
            }
        }

        document.addEventListener('keydown', async (e) => {
            if (!sessionId) return;
            
            const eventOverlay = document.getElementById('specialEventOverlay');
            if (eventOverlay.classList.contains('visible')) {
                const key = e.key;
                const option = eventOverlay.querySelector(`.event-option[data-key="${key}"]`);
                if (option) {
                    e.preventDefault();
                    await handleSpecialEvent(option.dataset.key, option.dataset.event);
                }
                return;
            }
            
            const achievementNotif = document.getElementById('achievementNotification');
            if (achievementNotif.classList.contains('visible')) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    achievementNotif.classList.remove('visible');
                }
                return;
            }
            
            const fragmentNotif = document.getElementById('fragmentNotification');
            if (fragmentNotif.classList.contains('visible')) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    fragmentNotif.classList.remove('visible');
                }
                return;
            }
            
            if (isWaitingForChoice) {
                const key = e.key;
                if (['1', '2', '3', '4'].includes(key)) {
                    e.preventDefault();
                    await makeChoice(key);
                }
                return;
            }
            
            if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Space') {
                e.preventDefault();
                await handleKeystroke();
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('collapseBtn').addEventListener('click', togglePanel);
        document.getElementById('collapsedPanel').addEventListener('click', togglePanel);
        document.getElementById('closeAchievementBtn').addEventListener('click', () => {
            document.getElementById('achievementNotification').classList.remove('visible');
        });
        document.getElementById('closeFragmentBtn').addEventListener('click', () => {
            document.getElementById('fragmentNotification').classList.remove('visible');
        });
        document.getElementById('generateReceiptBtn').addEventListener('click', generateReceipt);

        initStartScreen();
    </script>
</body>
</html>
